<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Data Live</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="./assets/fontAwesome/all.min.css">
</head>

<body>
  <div class="top-bar">
    <div class="left-section">
      <button class="gsi-material-button" title="Se connecter avec Google" id="loginBtn">
  <div class="gsi-material-button-state"></div>
  <div class="gsi-material-button-content-wrapper">
    <div class="gsi-material-button-icon">
      <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" xmlns:xlink="http://www.w3.org/1999/xlink" style="display: block;">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
        <path fill="none" d="M0 0h48v48H0z"></path>
      </svg>
    </div>
    <span class="gsi-material-button-contents">Se connecter</span>
  </div>
  </button>
    </div>
  
  <div class="action-btn">
    <i class="fas fa-broom" id="ClearData" title="Clear data"></i>
    <i class="fa fa-download" id="exportBtn" title="Exporter les données"></i>
    <i class="fa-solid fa-copy icon" id="copyId" title="Copier mon id"></i>
  </div>
  </div>

  </div>
  <div class="header">
    <img src="./assets/images/logo.png" alt="Logo" id="logo">
    <h2>Trafic Metter</h2>
  </div>
  <div>
    <p id="userStatus"></p>
  </div>
  <div class="tab">
    <i class="fa-solid fa-globe active" class="tabsList" data-target="direct-data"></i>
    <i class="fa-solid fa-ranking-star" class="tabsList" data-target="statistic"></i>
    <i class="fas fa-clock" class="tabsList" data-target="time-spend"></i>
  </div>
  <div id="status">Chargement...</div>
  <div id="direct-data" class="tab-content active">
    <ul id="tabsList"></ul>
  </div>
  <div id="statistic" class="tab-content">
    <h3>Top 5 des sites gourmand</h3>
    <ul id="topSitesList"></ul>
  </div>
  <div id="time-spend" class="tab-content">
    <h3>Temps passé par site</h3>
    <ul id="timeList"></ul>
    
  </div>

  <footer>
    <small>Coopyright 2025 | <span class="important">Tous droit réservé</span></small>
  </footer>
  <script src="popup.js"></script>
</body>

</html>
